# MySQL Configuration
# Local: uses localhost. Production (Render): set these as environment variables.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecommerce?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Shov@n2004}

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Security Settings
spring.security.user.name=user
spring.security.user.password=admin123

# SQL Initialization
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# Server port (Render sets PORT automatically)
server.port=${PORT:8080}
